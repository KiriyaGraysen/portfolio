<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <script src="https://kit.fontawesome.com/922051305a.js" crossorigin="anonymous"></script>

  
  <title>Portfolio</title>
  
  <!-- Styling for webpage -->
  <style>
    * {
      box-sizing: border-box;
    }
  
    body {
      margin: 0px;
      padding: 0px;
      background-color: white;
      font-family: Arial;
      min-height: 100vh;
    }
    
    .nav-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      background-color: rgb(25, 25, 25);
      color: white;
    }
    
    .nav-bar {
      width: 350px;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      list-style: none;
    }
    
    .nav-link a {
      color: white;
      text-decoration: none;
    }
    
    .about-me-container {
      width: 100%;
      display: flex;
    }
    
    .about-me,
    .personal-info {
      width: 50%;
      padding: 0px 50px;
    }
    
    .about-me h3,
    .personal-info h3 {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .personal-info span {
      font-weight: bold;
    }
    
    .personal-info p {
      margin: 0px;
      padding: 0px;
      line-height: 1.5;
    }
    
    .projects-container {
      display: block;
      width: 100%;
      height: 300px;
      padding: 0px 50px;
    }
    
    .projects-container h3 {
      text-align: center;
    }
    
    .projects-view-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 300px;
      border: 2px solid black;
    }
    
    .project-left-arrow,
    .project-right-arrow {
      font-size: 40px;
    }
    
    .project-card-container {
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid black;
    }
    
    .project-card-container > .project-card:nth-child(2) {
      margin-right: 10px;
      margin-left: 10px;
    }
    
    .project-card {
      width: 220px;
      border: 2px solid black;
      border-radius: 30px;
      overflow: hidden;
    }
    
    .project-card .project-image {
      width: 100%;
    }
    
    .project-card h3 {
      text-align: center;
    }
    
    .project-card a {
      display: block;
      margin-bottom: 10px;
      color: green;
      font-weight: bold;
      text-align: center;
      text-decoration: underline;
      cursor: pointer;
    }
    
    .status {
      text-align: center;
      margin-bottom: 14px;
    }
    
    .status span {
      font-size: 10px;
      padding: 4px 10px;
      background-color: green;
      border: 3px solid darkgreen;
      border-radius: 10px;
      color: white;
    }
  </style>
  
</head>
<body>
  <nav class="nav-container">
    <ul class="nav-bar">
      <li class="nav-link">
        <a href="index.html">Home</a>
      </li>
      
      <li class="nav-link">
        <a href="about.html">About</a>
      </li>
      
      <li class="nav-link">
        <a href="projects.html">Projects</a>
      </li>
    </ul>
  </nav>
  
  <main>
    <section class="about-me-container">
      <div class="personal-info">
        <h3>Personal Information</h3>
        <p><span>Name:</span> Sherwin B. Samonte</p>
        <p><span>Age:</span> 21</p>
        <p><span>Email:</span> sherwinsamonte56@gmail.com</p>
      </div>
      
      <div class="about-me">
        <h3>About Me</h3>
      </div>
    </section>
    
    <section class="projects-container">
      <h3>Projects</h3>
      <div class="projects-view-container">
        <div class="project-left-arrow"><i class="fa-solid fa-chevron-left"></i></div>
        
        <div class="project-card-container">
          <div class="project-card">
            <img class="project-image" src="assets/images/project-01.jpg">
            
            <h3>Simple Calculator</h3>
            
            <div class="status"><span>Completed</span></div>
            
            <a>Live View</a>
          </div>
          
          <div class="project-card">
            <img class="project-image" src="assets/images/project-01.jpg">
            
            <h3>Simple Calculator</h3>
            
            <div class="status"><span>Completed</span></div>
            
            <a>Live View</a>
          </div>
          
          <div class="project-card">
            <img class="project-image" src="assets/images/project-01.jpg">
            
            <h3>Simple Calculator</h3>
            
            <div class="status"><span>Completed</span></div>
            
            <a>Live View</a>
          </div>
        </div>
        
        <div class="project-right-arrow"><i class="fa-solid fa-chevron-right"></i></div>
      </div>
    </section>
  </main>

</body>
</html>
