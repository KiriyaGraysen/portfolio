<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  
  <title>Rock Paper Scissors</title>
</head>

<body>
  <p class="title">Rock Paper Scissors</p>
  
  <button onclick="
    playGame('rock');
  " class="move-btn"><img src="rock-emoji.png" class="move-icon"></button>
  <button onclick="
    playGame('paper');
  " class="move-btn"><img src="paper-emoji.png" class="move-icon"></button>
  <button onclick="
    playGame('scissors');
  " class="move-btn"><img src="scissors-emoji.png" class="move-icon"></button>
  
  <p class="result"></p>
  <p class="game-move"></p>
  <p class="scores"></p>
  
  <button onclick="
    score.wins = 0;
    score.losses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    updateScore();
  " class="reset-score-btn">Reset Score</button>
  
  <script src="script.js"></script>
</body>
</html>
