<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  
  <title>Rock Paper Scissors</title>
</head>

<body>
  <div class="game-container">
    <p class="title">Rock Paper Scissors</p>
    
    <button class="rock-btn move-btn"><img src="rock-emoji.png" class="move-icon"></button>
    <button class="paper-btn move-btn"><img src="paper-emoji.png" class="move-icon"></button>
    <button class="scissors-btn move-btn"><img src="scissors-emoji.png" class="move-icon"></button>
    
    <p class="result"></p>
    <p class="game-move"></p>
    <p class="scores"></p>
    
    <div class="btn-container">
      <button class="reset-score-btn">Reset Score</button>
      
      <button class="auto-play-btn">Auto Play</button>
    </div>
    
    <script src="script.js"></script>
  </div>
</body>
</html>
