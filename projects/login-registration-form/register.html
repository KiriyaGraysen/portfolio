<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://kit.fontawesome.com/922051305a.js" crossorigin="anonymous"></script>
  
  <title>Register</title>
  
  <style type="text/tailwindcss">
    /* To include padding or margin when using percentage in layout such as width or height */
    * {
      box-sizing: border-box;
    }
    
    @theme {
      --font-sans: "Inter", san-serif;
    }
    
    /* Enables light and dark mode */
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
</head>

<body class="p-0 m-0 bg-gray-100 dark:bg-zinc-950 font-sans">
  <div class="flex justify-center items-center min-h-svh">
    <form id="register-form" class="p-4 w-full max-w-[350px] flex flex-col gap-y-2 bg-white dark:bg-zinc-900 border rounded-xl border-gray-200 dark:border-zinc-800 shadow-sm">
      <p class="mb-4 text-2xl font-bold text-center text-indigo-600">Register</p>
      <input class="px-2 py-1 border-2 rounded-lg border-gray-200 focus:outline-none focus:border-indigo-500" type="text" name="username" placeholder="Username">
      
      <input class="px-2 py-1 border-2 rounded-lg border-gray-200 focus:outline-none focus:border-indigo-500" type="email" name="email" placeholder="Email">
      
      <input class="px-2 py-1 border-2 rounded-lg border-gray-200 focus:outline-none focus:border-indigo-500" type="password" name="password" placeholder="Password">
      
      <input class="px-2 py-1 mb-1 border-2 rounded-lg border-gray-200 focus:outline-none focus:border-indigo-500" type="password" name="confirm-password" placeholder="Confirm Password">
      
      <div class="flex items-center">
        <input id="privacy-checkbox" class="mr-2 checked:bg-indigo-600 cursor-pointer" type="checkbox" name="privacy-checkbox">
        <label class="text-sm cursor-pointer" for="privacy-checkbox">I accept the Privacy and Policy</label>
      </div>
      
      <input class="py-1 my-3 bg-indigo-600 text-gray-50 rounded-md shadow-sm" type="submit" value="Sign up">
      
      <p class="text-center text-sm">I already have an account. <a href="login.html" class="text-indigo-600">Login now</a></p>
    </form>
  </div>
  
  <script>
    const registerForm = document.querySelector('#register-form');
  </script>
</body>
</html>
