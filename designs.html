<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }
  
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .project-card {
      width: 20%;
      border: 2px solid black;
      border-radius: 30px;
      overflow: hidden;
    }
    
    .project-card .project-image {
      width: 100%;
    }
    
    .project-card h3 {
      text-align: center;
    }
    
    .project-card a {
      display: block;
      margin-bottom: 10px;
      color: green;
      font-weight: bold;
      text-align: center;
      text-decoration: underline;
      cursor: pointer;
    }
    
    .status {
      text-align: center;
      margin-bottom: 14px;
    }
    
    .status span {
      font-size: 10px;
      padding: 4px 10px;
      background-color: green;
      border: 3px solid darkgreen;
      border-radius: 10px;
      color: white;
    }
  </style>
</head>

<body>
  <div class="project-card">
    <img class="project-image" src="assets/images/project-01.jpg">
    <h3>Simple Calculator</h3>
    <div class="status"><span>Completed</span></div>
    <a>Live View</a>
  </div>
</body>
</html>
